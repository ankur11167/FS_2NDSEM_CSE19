<!DOCTYPE html>
<html>
<head>
    <title>Student Marks and Grade Calculator</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
            text-align: center;
            margin-top: 50px;
        }

        .container{
            width: 450px;
            margin: auto;

            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }

        input{
            width: 80%;
            padding: 10px;
            margin: 5px;
        }

        button{
            padding: 10px 20px;
            cursor: pointer;
        }

        #result{
            margin-top: 20px;
            font-size: 18px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">

    <h2>Student Marks and Grade Calculator</h2>

    <input type="number" id="m1" placeholder="Enter Subject 1 Marks"><br>
    <input type="number" id="m2" placeholder="Enter Subject 2 Marks"><br>
    <input type="number" id="m3" placeholder="Enter Subject 3 Marks"><br>
    <input type="number" id="m4" placeholder="Enter Subject 4 Marks"><br>
    <input type="number" id="m5" placeholder="Enter Subject 5 Marks"><br><br>

    <button onclick="calculateGrade()">Calculate Result</button>

    <div id="result"></div>

</div>

<script>

function calculateGrade()
{
    let m1 = Number(document.getElementById("m1").value);
    let m2 = Number(document.getElementById("m2").value);
    let m3 = Number(document.getElementById("m3").value);
    let m4 = Number(document.getElementById("m4").value);
    let m5 = Number(document.getElementById("m5").value);

    if(
        document.getElementById("m1").value === "" ||
        document.getElementById("m2").value === "" ||
        document.getElementById("m3").value === "" ||
        document.getElementById("m4").value === "" ||
        document.getElementById("m5").value === ""
    )
    {
        document.getElementById("result").innerHTML =
        "Please enter all subject marks.";
        return;
    }

    let total = m1 + m2 + m3 + m4 + m5;
    let average = total / 5;

    let grade;

    if(average >= 90)
    {
        grade = "A+";
    }
    else if(average >= 80)
    {
        grade = "A";
    }
    else if(average >= 70)
    {
        grade = "B";
    }
    else if(average >= 60)
    {
        grade = "C";
    }
    else if(average >= 50)
    {
        grade = "D";
    }
    else
    {
        grade = "F";
    }

    let status;

    if(m1 >= 35 && m2 >= 35 && m3 >= 35 && m4 >= 35 && m5 >= 35)
    {
        status = "PASS";
    }
    else
    {
        status = "FAIL";
    }

    document.getElementById("result").innerHTML =
    "<p>Total Marks: " + total + "</p>" +
    "<p>Average Marks: " + average.toFixed(2) + "</p>" +
    "<p>Grade: " + grade + "</p>" +
    "<p>Result: " + status + "</p>";
}

</script>

</body>
</html>
